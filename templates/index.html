<!DOCTYPE html>
<html>
<head>
    <title>BrainyBot</title>
</head>
<body>
    <h2>Login</h2>
    <input id="email" placeholder="Email">
    <input id="password" placeholder="Password">
    <button onclick="login()">Login</button>

    <h2>Upload PDF</h2>
    <input type="file" id="pdfFile"><button onclick="uploadPDF()">Upload</button>

    <h2>YouTube Transcription</h2>
    <input id="youtubeLink" placeholder="Paste YouTube URL"><button onclick="transcribe()">Transcribe</button>

    <pre id="output"></pre>
</body>
<script src="/static/app.js"></script>
</html>
